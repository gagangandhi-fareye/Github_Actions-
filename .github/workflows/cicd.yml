name: CICD

on:
  workflow_dispatch:

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        run: echo "Code Cloned from GitHub"

  build:
    
    runs-on: ubuntu-latest
    needs: code   # 👈 dependency
    steps:
      - name: Build Docker Container
        run: echo "Docker Container Build"

  test:
    
    runs-on: ubuntu-latest
    needs: build   # 👈 dependency
    steps:
      - name: Testing the app
        run: echo "Testing the docker file"
